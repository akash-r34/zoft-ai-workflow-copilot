name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      # config/env.ts requires DATABASE_URL unconditionally and validates it
      # eagerly at import time (no .env file exists in a fresh CI checkout —
      # apps/backend/.env is gitignored). A placeholder string satisfies that
      # check; nothing here actually connects to it, since every test that
      # touches a real Postgres is gated behind RUN_DB_INTEGRATION_TESTS
      # (unset here, so those tests skip) — see docs/developer-guide/13-testing.md.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/zoft?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contract package
        run: pnpm --filter @zoft/contract build

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Lint all packages
        run: pnpm -r lint

      - name: Run tests
        run: pnpm test
