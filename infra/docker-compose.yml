services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zoft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Below: the full app stack (Phase 6). All three build from the monorepo
  # root (../apps/backend/Dockerfile, ../apps/frontend/Dockerfile) since a
  # pnpm/Turborepo workspace's build context has to be the repo root, not
  # the individual app directory. `docker compose up` from a clean checkout
  # needs no API keys — LLM_PROVIDER defaults to "mock" (config/env.ts).

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      # Service-name hostnames (Docker's internal DNS), not localhost — this
      # is the one thing that has to differ from apps/backend/.env, which is
      # written for a host-process dev server instead. Everything else
      # (LLM_PROVIDER, APPROVAL_REQUIRED, SELF_CORRECTION_BUDGET, etc.) is
      # left to config/env.ts's own defaults.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zoft?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    command: ["node", "dist/workers/main.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zoft?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
